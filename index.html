  const [sectionData, setSectionData] = useState({});  // legacy
  const [loading, setLoading] = useState(true);
  const [globalSearchOpen, setGlobalSearchOpen] = useState(false);
  const savingRef = useRef(false);

  useEffect(() => {
    API.getAllData().then(data => {
      if (data.pages) setPages(data.pages);
      if (data.sectionData) setSectionData(data.sectionData);
      if (data.settings) setSettings(prev => ({ ...prev, ...data.settings }));
      setLoading(false);
    }).catch(err => { console.error(err); setLoading(false); });
    const unsub = API.onRemoteUpdate(data => {
      // 내가 방금 저장한 건 무시 + 저장 후 2초 쿨다운
      if (savingRef.current) return;
      if (Date.now() - (savingRef._lastSaveTime || 0) < 2000) return;
      if (data.pages) setPages(data.pages);
      if (data.sectionData) setSectionData(data.sectionData);
      if (data.settings) setSettings(prev => ({ ...prev, ...data.settings }));
    });
    return unsub;
  }, []);

  useEffect(() => {
    const btn = document.getElementById('edit-mode-btn');
    const adminBtn = document.getElementById('admin-settings-btn');
    if (btn) {
      btn.onclick = () => setEditMode(e => !e);
      btn.textContent = editMode ? "✏️ 편집 ON" : "👁️ 보기";
      btn.style.background = editMode ? "#6C5CE7" : "";
      btn.style.color = editMode ? "#fff" : "";
      btn.style.borderColor = editMode ? "#6C5CE7" : "";
    }
    if (adminBtn) { adminBtn.onclick = () => setMode(m => m === "admin" ? "public" : "admin"); }
  }, [editMode]);

  // Debounced auto-save - React state가 source of truth
  const pagesRef = useRef(pages);
  const settingsRef = useRef(settings);
  const saveTimerRef = useRef(null);
  const lastSavedJsonRef = useRef("");
  pagesRef.current = pages;
  settingsRef.current = settings;

  useEffect(() => {
    if (loading) return;
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      if (savingRef.current) return; // 이전 저장이 아직 진행 중이면 스킵 (다음 cycle에서 처리)
      const currentPages = pagesRef.current;
      const currentSettings = settingsRef.current;
      const currentJson = JSON.stringify({ p: currentPages, s: currentSettings });
      if (currentJson === lastSavedJsonRef.current) return;

      savingRef.current = true;
      lastSavedJsonRef.current = currentJson;

      // _cache를 직접 덮어쓰기 (merge 안 함)
      if (API._cache) {
        API._cache.pages = currentPages;
        API._cache.settings = { ...API._cache.settings, ...currentSettings };
        API._lastWrittenJson = ''; // 강제 재저장
        API._persist().then(() => {
          savingRef.current = false;
          savingRef._lastSaveTime = Date.now();
        }).catch(e => {
          console.error('Auto-save error:', e);
          savingRef.current = false;
          lastSavedJsonRef.current = ''; // 실패 시 다음에 다시 시도
        });
      } else {
        API._ensure().then(d => {
          d.pages = currentPages;
          d.settings = { ...d.settings, ...currentSettings };
          return API._persist();
        }).then(() => {
          savingRef.current = false;
          savingRef._lastSaveTime = Date.now();
        }).catch(e => {
          console.error('Auto-save error:', e);
          savingRef.current = false;
          lastSavedJsonRef.current = '';
        });
      }
    }, 1500);
    return () => clearTimeout(saveTimerRef.current);
  }, [pages, settings, loading]);

  // Global search shortcut (Ctrl+K / Cmd+K)
  useEffect(() => {
    const h = (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); setGlobalSearchOpen(true); } };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, []);

  const persistPages = () => {
    API._ensure().then(d => { d.pages = pages; return API._persist(); });
  };

  const onNav = (id) => { setActivePage(id); setMode("public"); };

  if (loading) return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column" }}>
      <div style={{ width: 40, height: 40, border: "3px solid #f0f0f0", borderTopColor: "#6C5CE7", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
      <p style={{ marginTop: 16, color: "#888", fontSize: 14 }}>로딩 중...</p>
    </div>
  );

  if (mode === "admin") {
    return (
      <div style={{ display: "flex", minHeight: "100vh", background: "#F8F8FA" }}>
        <AdminSidebar active={adminTab} setActive={setAdminTab} pages={pages} />
        <div style={{ flex: 1, padding: "1.5rem 2rem", minWidth: 0 }}>
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}>
            <button onClick={() => { setMode("public"); setActivePage("home"); }} style={{ background: "#6C5CE7", color: "#fff", border: "none", borderRadius: 20, padding: "8px 18px", cursor: "pointer", fontSize: 13, fontWeight: 500 }}>👁️ 상담 모드 보기</button>
          </div>
          {adminTab === "page-tree" && <PageTreeManager pages={pages} setPages={setPages} persistPages={persistPages} />}
          {adminTab === "main-page" && <MainPageEditor settings={settings} setSettings={setSettings} />}
          {adminTab === "upload-settings" && <UploadSettings settings={settings} setSettings={setSettings} />}
          {adminTab === "backup" && <BackupRestore />}
          {adminTab === "migration" && <LegacyMigration pages={pages} setPages={setPages} sectionData={sectionData} />}
          {adminTab.startsWith("page_") && (() => {
            const pageId = adminTab.replace("page_", "");
            const pg = pages.find(p => p.id === pageId);
            if (!pg) return <div>페이지를 찾을 수 없습니다</div>;
            return <PageView page={pg} pages={pages} setPages={setPages} settings={settings} onNav={onNav} editMode={true} onSearch={() => setGlobalSearchOpen(true)} />;
          })()}
        </div>
        <GlobalSearch open={globalSearchOpen} onClose={() => setGlobalSearchOpen(false)} pages={pages} onNav={onNav} />
      </div>
    );
  }

  // Public mode
  if (activePage === "home") {
    return (
      <div>
        <PageNav pages={pages} activePage="home" onNav={onNav} scrolled={false} settings={settings} onSearch={() => setGlobalSearchOpen(true)} />
        <HomePage pages={pages} settings={settings} onNav={onNav} editMode={editMode} />
        <GlobalSearch open={globalSearchOpen} onClose={() => setGlobalSearchOpen(false)} pages={pages} onNav={onNav} />
      </div>
    );
  }

  const currentPage = pages.find(p => p.id === activePage);
  if (currentPage) {
    return (
      <>
        <PageView page={currentPage} pages={pages} setPages={setPages} settings={settings} onNav={onNav} editMode={editMode} onSearch={() => setGlobalSearchOpen(true)} />
        <GlobalSearch open={globalSearchOpen} onClose={() => setGlobalSearchOpen(false)} pages={pages} onNav={onNav} />
      </>
    );
  }

  return (
    <div>
      <PageNav pages={pages} activePage="home" onNav={onNav} scrolled={false} settings={settings} />
      <div style={{ maxWidth: 600, margin: "0 auto", padding: "6rem 2rem", textAlign: "center" }}>
        <div style={{ fontSize: 48, marginBottom: 16, opacity: 0.3 }}>🔍</div>
        <div style={{ fontSize: 18, color: "#888", marginBottom: 24 }}>페이지를 찾을 수 없습니다</div>
        <button onClick={() => onNav("home")} style={{ padding: "10px 24px", borderRadius: 24, background: "#6C5CE7", color: "#fff", border: "none", cursor: "pointer" }}>홈으로</button>
      </div>
      <GlobalSearch open={globalSearchOpen} onClose={() => setGlobalSearchOpen(false)} pages={pages} onNav={onNav} />
    </div>
  );
}

// ============ 인증 처리 + 앱 초기화 ============
(function initAuth() {
  var loginScreen = document.getElementById('login-screen');
  var userBar = document.getElementById('user-bar');
  var loadingEl = document.getElementById('loading');
  var emailInput = document.getElementById('login-email');
  var passwordInput = document.getElementById('login-password');
  var loginBtn = document.getElementById('login-btn');
  var errorEl = document.getElementById('login-error');
  var userEmailEl = document.getElementById('user-email');
  var logoutBtn = document.getElementById('logout-btn');
  var syncStatusEl = document.getElementById('sync-status');
  var appRendered = false;

  function showError(msg) {
    errorEl.textContent = msg || '';
  }
  function setLoginLoading(loading) {
    loginBtn.disabled = loading;
    loginBtn.textContent = loading ? '로그인 중...' : '로그인';
  }

  // 로그인 버튼
  function doLogin() {
    var email = emailInput.value.trim();
    var pw = passwordInput.value;
    if (!email || !pw) { showError('이메일과 비밀번호를 입력하세요'); return; }
    showError('');
    setLoginLoading(true);
    fbAuth.signInWithEmailAndPassword(email, pw).catch(function(err) {
      setLoginLoading(false);
      var code = err.code || '';
      if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
        showError('이메일 또는 비밀번호가 올바르지 않습니다');
      } else if (code === 'auth/invalid-email') {
        showError('올바른 이메일 형식이 아닙니다');
      } else if (code === 'auth/too-many-requests') {
        showError('로그인 시도가 너무 많습니다. 잠시 후 다시 시도하세요');
      } else if (code === 'auth/network-request-failed') {
        showError('네트워크 연결을 확인하세요');
      } else {
        showError('로그인 실패: ' + (err.message || code));
      }
    });
  }
  loginBtn.addEventListener('click', doLogin);
  passwordInput.addEventListener('keypress', function(e){ if (e.key === 'Enter') doLogin(); });
  emailInput.addEventListener('keypress', function(e){ if (e.key === 'Enter') passwordInput.focus(); });

  // 로그아웃 버튼
  logoutBtn.addEventListener('click', function() {
    if (!confirm('로그아웃하시겠습니까?')) return;
    fbAuth.signOut().then(function() { location.reload(); });
  });

  // 온라인/오프라인 표시
  window.addEventListener('online', function(){ syncStatusEl.style.color = '#4CAF50'; syncStatusEl.title = '온라인'; });
  window.addEventListener('offline', function(){ syncStatusEl.style.color = '#f39c12'; syncStatusEl.title = '오프라인 (캐시된 데이터 표시 중)'; });

  // ===== 마이그레이션 체크 (IndexedDB → Firebase) =====
  function checkMigration() {
    // 기존 IndexedDB에 데이터가 있는지 확인
    return new Promise(function(resolve) {
      if (!window.indexedDB) { resolve(false); return; }
      var req = indexedDB.open('sbs_academy_db', 1);
      req.onupgradeneeded = function(e) {
        // DB가 없었던 경우 (새로 만들어지는 상황) → 데이터 없음
        e.target.transaction.abort();
        resolve(false);
      };
      req.onsuccess = function(e) {
        var db = e.target.result;
        if (!db.objectStoreNames.contains('kv')) { db.close(); resolve(false); return; }
        var tx = db.transaction('kv', 'readonly');
        var getReq = tx.objectStore('kv').get('main');
        getReq.onsuccess = function() {
          db.close();
          var d = getReq.result;
          // 실제 콘텐츠가 있는지 (카테고리나 아이템이 하나라도 있는지)
          var hasContent = false;
          if (d) {
            if ((d.categories || []).length > 0) hasContent = true;
            if (d.sectionData) {
              Object.keys(d.sectionData).forEach(function(k) {
                if ((d.sectionData[k].items || []).length > 0) hasContent = true;
                if ((d.sectionData[k].subCategories || []).length > 0) hasContent = true;
              });
            }
          }
          resolve(hasContent);
        };
        getReq.onerror = function() { db.close(); resolve(false); };
      };
      req.onerror = function() { resolve(false); };
    });
  }

  function showMigrationPrompt() {
    // Firestore에 이미 데이터가 있는지 확인
    return API._ensure().then(function(d) {
      var firestoreHasContent = (d.categories || []).length > 0 || Object.keys(d.sectionData || {}).some(function(k){
        return (d.sectionData[k].items || []).length > 0 || (d.sectionData[k].subCategories || []).length > 0;
      });

      return checkMigration().then(function(hasLocalData) {
        if (!hasLocalData) return;

        // ★ Firestore에 이미 데이터가 있으면 마이그레이션 완료된 것으로 간주 → 팝업 스킵
        // (IndexedDB 찌꺼기가 남아있어도 귀찮게 묻지 않음)
        if (firestoreHasContent) {
          console.log('[마이그레이션] Firestore에 데이터 있음 → IndexedDB 찌꺼기 무시, 팝업 스킵');
          // 선택: 찌꺼기 자동 삭제 (크기 줄이기)
          try { indexedDB.deleteDatabase('sbs_academy_db'); } catch(e){}
          return;
        }

        // 마이그레이션 UI 생성
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9500;font-family:inherit;';
        overlay.innerHTML = '' +
          '<div style="background:#fff;padding:32px;border-radius:12px;width:440px;max-width:calc(100% - 32px);box-shadow:0 20px 60px rgba(0,0,0,0.3);">' +
          '<h2 style="font-size:18px;font-weight:700;margin-bottom:8px;color:#222;">📦 기존 데이터 발견</h2>' +
          '<p style="font-size:13px;color:#666;line-height:1.6;margin-bottom:20px;">' +
          '이 브라우저에 저장된 기존 상담 자료가 있습니다.<br>' +
          'Firebase로 이전하면 모든 직원이 동일한 자료를 볼 수 있습니다.' +
          (firestoreHasContent ? '<br><br><span style="color:#e67e22;font-weight:600;">⚠ 경고: Firebase에 이미 데이터가 있습니다. 이전하면 덮어쓰기됩니다.</span>' : '') +
          '</p>' +
          '<div id="mig-progress" style="display:none;margin:16px 0;padding:12px;background:#f5f5f5;border-radius:8px;font-size:12px;color:#555;"></div>' +
          '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
          '<button id="mig-skip" style="background:#f5f5f5;color:#666;border:none;border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer;">나중에</button>' +
          '<button id="mig-start" style="background:#6C5CE7;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;">지금 이전하기</button>' +
          '</div>' +
          '</div>';
        document.body.appendChild(overlay);

        var progressEl = overlay.querySelector('#mig-progress');
        var skipBtn = overlay.querySelector('#mig-skip');
        var startBtn = overlay.querySelector('#mig-start');

        skipBtn.addEventListener('click', function() { overlay.remove(); });
        startBtn.addEventListener('click', function() {
          if (firestoreHasContent && !confirm('Firebase의 기존 데이터가 덮어쓰기됩니다. 계속하시겠습니까?')) return;
          startBtn.disabled = true;
          skipBtn.disabled = true;
          startBtn.textContent = '이전 중...';
          progressEl.style.display = 'block';
          progressEl.textContent = '시작하는 중...';
          API.migrateFromIndexedDB(function(p) {
            progressEl.textContent = p.message || '';
            if (p.percent !== undefined) progressEl.textContent += ' (' + p.percent + '%)';
          }).then(function() {
            progressEl.innerHTML = '<span style="color:#4CAF50;font-weight:600;">✓ 이전 완료! 3초 후 자동 새로고침됩니다.</span>';
            setTimeout(function(){ location.reload(); }, 3000);
          }).catch(function(err) {
            progressEl.innerHTML = '<span style="color:#e74c3c;">❌ 이전 실패: ' + (err.message || err) + '</span>';
            startBtn.disabled = false;
            skipBtn.disabled = false;
            startBtn.textContent = '다시 시도';
          });
        });
      });
    });
  }

  // 인증 상태 변경 감지
  fbAuth.onAuthStateChanged(function(user) {
    if (user) {
      // 로그인됨
      loginScreen.classList.add('hidden');
      userBar.classList.remove('hidden');
      userEmailEl.textContent = user.email;

      if (!appRendered) {
        appRendered = true;
        ReactDOM.render(React.createElement(App), document.getElementById('root'));
        loadingEl.classList.add('hidden');
        // 앱 렌더 후 마이그레이션 체크
        setTimeout(function(){ showMigrationPrompt().catch(function(e){ console.warn(e); }); }, 1500);
      }
    } else {
      // 로그아웃됨 → 로그인 화면
      loadingEl.classList.add('hidden');
      loginScreen.classList.remove('hidden');
      userBar.classList.add('hidden');
      emailInput.value = '';
      passwordInput.value = '';
      setLoginLoading(false);
      setTimeout(function(){ emailInput.focus(); }, 100);
    }
  });
})();
  </script>
</body>
