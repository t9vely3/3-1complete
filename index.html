// ─── Backup Restore (kept) ───
function BackupRestore() {
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const doExport = async () => { setBusy(true); try { const d = await API.exportJSON(); const blob = new Blob([JSON.stringify(d, null, 2)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "sbs_backup_" + new Date().toISOString().slice(0,10) + ".json"; a.click(); URL.revokeObjectURL(a.href); setMsg("✅ 내보내기 완료"); } catch(e) { setMsg("❌ " + e.message); } setBusy(false); };
  const doImport = () => { const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json"; inp.onchange = async e => { const f = e.target.files[0]; if (!f) return; if (!confirm("현재 데이터를 덮어쓰시겠습니까?")) return; setBusy(true); try { const t = await f.text(); const j = JSON.parse(t); await API.importJSON(j); setMsg("✅ 복원 완료. 새로고침합니다."); setTimeout(() => location.reload(), 1000); } catch(e) { setMsg("❌ " + e.message); } setBusy(false); }; inp.click(); };
  const doClear = async () => { if (!confirm("⚠️ 모든 데이터가 삭제됩니다.")) return; if (!confirm("정말 진행하시겠습니까?")) return; setBusy(true); await API.clearAll(); setMsg("✅ 초기화 완료"); setTimeout(() => location.reload(), 800); };
  return (
    <div>
      <h2 style={{ margin: "0 0 4px", fontSize: 22, fontWeight: 600 }}>백업 / 복원</h2>
      <p style={{ margin: "0 0 20px", fontSize: 13, color: "#888" }}>데이터를 내보내거나 복원합니다.</p>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div style={{ background: "#fff", border: "1px solid rgba(0,0,0,0.06)", borderRadius: 14, padding: 24 }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>⬇️</div><div style={{ fontWeight: 600, marginBottom: 6 }}>전체 내보내기</div>
          <div style={{ fontSize: 12, color: "#888", marginBottom: 16, lineHeight: 1.6 }}>모든 데이터를 JSON으로 내보냅니다.</div>
          <button onClick={doExport} disabled={busy} style={{ width: "100%", padding: 12, borderRadius: 10, background: "#6C5CE7", color: "#fff", border: "none", cursor: busy ? "not-allowed" : "pointer", fontSize: 14, fontWeight: 500 }}>JSON 내보내기</button>
        </div>
        <div style={{ background: "#fff", border: "1px solid rgba(0,0,0,0.06)", borderRadius: 14, padding: 24 }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>📤</div><div style={{ fontWeight: 600, marginBottom: 6 }}>JSON 복원</div>
          <div style={{ fontSize: 12, color: "#888", marginBottom: 16, lineHeight: 1.6 }}>이전에 내보낸 파일을 복원합니다.</div>
          <button onClick={doImport} disabled={busy} style={{ width: "100%", padding: 12, borderRadius: 10, background: "#fff", color: "#6C5CE7", border: "1px solid #6C5CE7", cursor: busy ? "not-allowed" : "pointer", fontSize: 14, fontWeight: 500 }}>JSON 복원하기</button>
        </div>
      </div>
      <div style={{ background: "#FFF8F8", border: "1px solid #FFE0E0", borderRadius: 14, padding: 20, marginTop: 16 }}>
        <div style={{ fontWeight: 600, marginBottom: 4, color: "#c0392b" }}>⚠️ 위험 영역</div>
        <button onClick={doClear} disabled={busy} style={{ padding: "8px 16px", borderRadius: 8, background: "#fff", color: "#e74c3c", border: "1px solid #e74c3c", cursor: "pointer", fontSize: 13, marginTop: 8 }}>전체 데이터 삭제</button>
      </div>
      {msg && <div style={{ marginTop: 16, padding: 12, borderRadius: 8, background: "#F0F7FF", color: "#333", fontSize: 13 }}>{msg}</div>}
    </div>
  );
}

// ─── Page Editor Modal ───
function PageEditorModal({ open, onClose, page, pages, onSave, settings }) {
  const [name, setName] = useState("");
  const [icon, setIcon] = useState("🎨");
  const [color, setColor] = useState("#6C5CE7");
  const [parentId, setParentId] = useState(null);
  const [desc, setDesc] = useState("");
  const [coverImage, setCoverImage] = useState(null);
  const [uploading, setUploading] = useState(false);

  useEffect(() => {
    if (!open) return;
    if (page) { setName(page.name||""); setIcon(page.icon||"🎨"); setColor(page.color||"#6C5CE7"); setParentId(page.parentId||null); setDesc(page.desc||""); setCoverImage(page.coverImage||null); }
    else { setName(""); setIcon("🎨"); setColor(PAGE_COLORS[Math.floor(Math.random()*PAGE_COLORS.length)]); setParentId(null); setDesc(""); setCoverImage(null); }
  }, [open, page]);

  const handleCoverUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file || !isImg(file)) { alert("이미지 파일만 가능합니다"); return; }
    setUploading(true);
    try {
      // 커버 이미지는 압축 없이 직접 업로드
      const result = await API.uploadFile(file);
      setCoverImage({ fileId: result.fileId, directUrl: result.directUrl, thumbnailUrl: result.thumbnailUrl });
    } catch(err) { alert("업로드 실패: " + err.message); }
    setUploading(false);
  };

  const save = () => {
    if (!name.trim()) { alert("이름을 입력하세요"); return; }
    const p = page ? { ...page } : { id: "pg_" + Date.now() + "_" + Math.floor(Math.random()*10000), order: pages.length, tabs: JSON.parse(JSON.stringify(DEFAULT_TABS.map((t,i)=>({...t, id: "tab_"+Date.now()+"_"+i})))), items: [], tabFields: {}, contentBlocks: [] };
    p.name = name.trim(); p.icon = icon; p.color = color; p.parentId = parentId || null; p.desc = desc; p.coverImage = coverImage;
    onSave(p); onClose();
  };

  // 자기 자신과 자식 페이지는 부모 옵션에서 제외
  const getDescendantIds = (pid) => {
    const ids = [pid];
    (pages||[]).filter(p => p.parentId === pid).forEach(c => ids.push(...getDescendantIds(c.id)));
    return ids;
  };
  const excludeIds = page ? new Set(getDescendantIds(page.id)) : new Set();
  const parentOptions = (pages||[]).filter(p => !excludeIds.has(p.id));

  return (
    <Modal open={open} onClose={onClose} onSubmit={save} title={page ? "페이지 수정" : "새 페이지"} width={480}>
      <Field label="페이지 이름" value={name} onChange={setName} placeholder="예: 편집디자인" required />
      <div style={{ marginBottom: 14 }}>
        <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 6 }}>아이콘</label>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>{PAGE_ICONS.map(ic => <div key={ic} onClick={() => setIcon(ic)} style={{ width: 36, height: 36, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, cursor: "pointer", background: icon === ic ? `${color}20` : "rgba(0,0,0,0.03)", border: icon === ic ? `2px solid ${color}` : "2px solid transparent" }}>{ic}</div>)}</div>
      </div>
      <div style={{ marginBottom: 14 }}>
        <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 6 }}>색상</label>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>{PAGE_COLORS.map(c => <div key={c} onClick={() => setColor(c)} style={{ width: 28, height: 28, borderRadius: "50%", background: c, cursor: "pointer", border: color === c ? "3px solid #333" : "2px solid transparent" }} />)}</div>
      </div>
      <div style={{ marginBottom: 14 }}>
        <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 6 }}>상위 페이지</label>
        <select value={parentId || ""} onChange={e => setParentId(e.target.value || null)} style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid rgba(0,0,0,0.1)", fontSize: 14 }}>
          <option value="">없음 (최상위)</option>
          {parentOptions.map(p => <option key={p.id} value={p.id}>{"  ".repeat(getPagePath(pages, p.id).length - 1)}{p.icon} {p.name}</option>)}
        </select>
      </div>

// ─── Tab Manager Modal ───
function TabManagerModal({ open, onClose, page, onSave }) {
  const [tabs, setTabs] = useState([]);
  const [addName, setAddName] = useState("");
  const [addIcon, setAddIcon] = useState("📁");

  useEffect(() => { if (open && page) setTabs(JSON.parse(JSON.stringify(page.tabs || []))); }, [open, page]);

  const save = () => { onSave({ ...page, tabs }); onClose(); };
  const addTab = () => {
    if (!addName.trim()) return;
    setTabs(t => [...t, { id: "tab_" + Date.now(), name: addName.trim(), icon: addIcon, order: t.length }]);
    setAddName(""); setAddIcon("📁");
  };
  const removeTab = (id) => { if (confirm("이 탭을 삭제하시겠습니까? 포함된 자료는 삭제되지 않습니다.")) setTabs(t => t.filter(x => x.id !== id)); };
  const moveTab = (idx, dir) => { const arr = [...tabs]; const ni = idx + dir; if (ni < 0 || ni >= arr.length) return; [arr[idx], arr[ni]] = [arr[ni], arr[idx]]; arr.forEach((t,i) => t.order = i); setTabs(arr); };

  return (
    <Modal open={open} onClose={onClose} title="탭 관리" width={460}>
      <div style={{ marginBottom: 16 }}>
        {tabs.map((t, i) => (
          <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", marginBottom: 4, borderRadius: 10, background: "rgba(0,0,0,0.02)", border: "1px solid rgba(0,0,0,0.04)" }}>
            <span style={{ fontSize: 16 }}>{t.icon}</span>
            <span style={{ flex: 1, fontSize: 14, fontWeight: 500 }}>{t.name}</span>
            <button onClick={() => moveTab(i, -1)} disabled={i===0} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, opacity: i===0?0.3:1 }}>↑</button>
            <button onClick={() => moveTab(i, 1)} disabled={i===tabs.length-1} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, opacity: i===tabs.length-1?0.3:1 }}>↓</button>
            <button onClick={() => removeTab(t.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#e74c3c", fontSize: 12 }}>✕</button>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", padding: "12px", borderRadius: 10, background: "rgba(108,92,231,0.04)", border: "1px dashed rgba(108,92,231,0.3)" }}>
        <select value={addIcon} onChange={e => setAddIcon(e.target.value)} style={{ padding: 6, borderRadius: 6, border: "1px solid rgba(0,0,0,0.1)", fontSize: 16, width: 44 }}>
          {["📁","🎨","📚","🔗","📊","🎬","📷","📝","💡","🎯"].map(ic => <option key={ic} value={ic}>{ic}</option>)}
        </select>
        <input value={addName} onChange={e => setAddName(e.target.value)} placeholder="새 탭 이름" onKeyPress={e => e.key === 'Enter' && addTab()} style={{ flex: 1, padding: "8px 12px", borderRadius: 8, border: "1px solid rgba(0,0,0,0.1)", fontSize: 13 }} />
        <button onClick={addTab} style={{ padding: "8px 16px", borderRadius: 8, background: "#6C5CE7", color: "#fff", border: "none", cursor: "pointer", fontSize: 13, fontWeight: 500 }}>추가</button>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
        <button onClick={onClose} style={{ padding: "10px 20px", borderRadius: 10, border: "1px solid rgba(0,0,0,0.1)", background: "#fff", cursor: "pointer" }}>취소</button>
        <button onClick={save} style={{ padding: "10px 24px", borderRadius: 10, background: "#6C5CE7", color: "#fff", border: "none", cursor: "pointer", fontWeight: 500 }}>적용</button>
      </div>
    </Modal>
  );
}

// ─── Move Item Modal ───
function MoveItemModal({ open, onClose, pages, currentPageId, currentTabId, onMove }) {
  const [targetPageId, setTargetPageId] = useState("");
  const [targetTabId, setTargetTabId] = useState("");

  useEffect(() => { if (open) { setTargetPageId(""); setTargetTabId(""); } }, [open]);

  const targetPage = pages.find(p => p.id === targetPageId);
  const targetTabs = targetPage?.tabs || [];

  const doMove = () => {
    if (!targetPageId || !targetTabId) { alert("이동할 페이지와 탭을 선택하세요"); return; }
    onMove(targetPageId, targetTabId);
    onClose();
  };

  // 페이지 트리를 flat 리스트로 (indented)
  const flatPages = [];
  const buildFlat = (parentId, depth) => {
    getPageChildren(pages, parentId).forEach(p => {
      flatPages.push({ ...p, depth });
      buildFlat(p.id, depth + 1);
    });
  };
  buildFlat(null, 0);

  return (
    <Modal open={open} onClose={onClose} title="자료 이동" width={420}>
      <div style={{ marginBottom: 14 }}>
        <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 6 }}>이동할 페이지</label>
        <select value={targetPageId} onChange={e => { setTargetPageId(e.target.value); setTargetTabId(""); }} style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid rgba(0,0,0,0.1)", fontSize: 14 }}>
          <option value="">선택하세요</option>
          {flatPages.map(p => <option key={p.id} value={p.id}>{"　".repeat(p.depth)}{p.icon} {p.name}{p.id === currentPageId ? " (현재)" : ""}</option>)}
        </select>
      </div>
      {targetPageId && (
        <div style={{ marginBottom: 14 }}>
          <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 6 }}>이동할 탭</label>
          <select value={targetTabId} onChange={e => setTargetTabId(e.target.value)} style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid rgba(0,0,0,0.1)", fontSize: 14 }}>
            <option value="">선택하세요</option>
            {targetTabs.map(t => <option key={t.id} value={t.id}>{t.icon} {t.name}{(targetPageId === currentPageId && t.id === currentTabId) ? " (현재)" : ""}</option>)}
          </select>
        </div>
      )}
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
        <button onClick={onClose} style={{ padding: "10px 20px", borderRadius: 10, border: "1px solid rgba(0,0,0,0.1)", background: "#fff", cursor: "pointer" }}>취소</button>
        <button onClick={doMove} disabled={!targetPageId || !targetTabId} style={{ padding: "10px 24px", borderRadius: 10, background: "#6C5CE7", color: "#fff", border: "none", cursor: "pointer", fontWeight: 500, opacity: (!targetPageId||!targetTabId)?0.5:1 }}>이동</button>
      </div>
    </Modal>
  );
}

// ─── Page Item Editor (adapts ItemEditorModal for page tabs) ───
function PageItemEditorModal({ open, onClose, page, tabId, editItemId, onSave, settings }) {
  const fields = getEffectiveTabFields(page, tabId);
  const [form, setForm] = useState({});
  const [formFiles, setFormFiles] = useState([]);
  const [formTags, setFormTags] = useState([]);

  useEffect(() => {
    if (!open) return;
    if (editItemId) {
      const item = (page.items||[]).find(i => String(i.id) === String(editItemId));
      if (item) { const f = {}; fields.forEach(fd => f[fd.key] = item[fd.key] !== undefined ? item[fd.key] : ""); f.status = item.status||"published"; f.featured = !!item.featured; setForm(f); setFormFiles(item.files||[]); setFormTags(item.tags||[]); return; }
    }
    const f = {}; fields.forEach(fd => f[fd.key] = ""); f.status = "published"; f.featured = false; setForm(f); setFormFiles([]); setFormTags([]);
  }, [open, editItemId, tabId]);

  const save = () => {
    const first = fields.find(f => f.required);
    if (first && !form[first.key]?.toString().trim()) { alert(first.label + "을(를) 입력하세요"); return; }
    let baseItem = {};
    if (editItemId) { const existing = (page.items||[]).find(i => String(i.id) === String(editItemId)); if (existing) baseItem = { ...existing }; }
    const item = { ...baseItem, ...form, files: formFiles, tags: formTags, date: new Date().toISOString().split("T")[0] };
    if (!editItemId) { item.id = genId(); item.tabId = tabId; }
    else { item.id = editItemId; }
    onSave(item); onClose();
  };

  const tab = (page.tabs||[]).find(t => t.id === tabId);

  return (
    <Modal open={open} onClose={onClose} onSubmit={save} title={`${tab?.name||""} ${editItemId ? "수정" : "등록"}`} width={600}>
      {fields.map(f => <Field key={f.key} label={f.label} value={form[f.key]} onChange={v => setForm(p => ({ ...p, [f.key]: v }))} type={f.type} placeholder={f.placeholder} options={f.options} required={f.required} multiline={f.type === "textarea"} />)}
      {form.videoUrl && toEmbedUrl(form.videoUrl) && <div style={{ marginBottom: 14 }}><label style={{ fontSize: 13, color: "#666", marginBottom: 5, display: "block" }}>영상 미리보기</label><VideoEmbed url={form.videoUrl} /></div>}
      <TagInput tags={formTags} setTags={setFormTags} />
      <FileUploadZone files={formFiles} setFiles={setFormFiles} settings={settings} />
      <div style={{ display: "flex", gap: 12, marginBottom: 8 }}>
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, cursor: "pointer" }}><input type="checkbox" checked={!!form.featured} onChange={e => setForm(p => ({ ...p, featured: e.target.checked }))} /> 주요 항목</label>
        <select value={form.status||"published"} onChange={e => setForm(p => ({ ...p, status: e.target.value }))} style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid rgba(0,0,0,0.1)", fontSize: 13 }}><option value="published">공개</option><option value="draft">비공개</option></select>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 12 }}>
        <button onClick={onClose} style={{ padding: "10px 20px", borderRadius: 10, border: "1px solid rgba(0,0,0,0.1)", background: "#fff", cursor: "pointer" }}>취소</button>
        <button onClick={save} style={{ padding: "10px 24px", borderRadius: 10, background: "#6C5CE7", color: "#fff", border: "none", cursor: "pointer", fontWeight: 500 }}>저장</button>
      </div>
    </Modal>
  );
}

// ─── Block Editor (안정화 + 스타일 개선) ───
// 핵심: 로컬 state로만 동작. blur 시에만 부모에 전달 → 타이핑 중 리렌더 없음
const BlockEditor = React.memo(function BlockEditor({ blocks: initBlocks, onChange, editMode, color }) {
  const [blocks, setBlocks] = useState([]);
  const initRef = useRef(null);
  const onChangeRef = useRef(onChange);
  onChangeRef.current = onChange;

  useEffect(() => {
    const key = JSON.stringify((initBlocks||[]).map(b => b.id));
    if (key !== initRef.current) {
      initRef.current = key;
      setBlocks(JSON.parse(JSON.stringify(initBlocks || [])));
    }
  }, [initBlocks]);

  const flush = (arr) => { onChangeRef.current(arr); };

  const addBlock = (type) => {
    const b = { id: "blk_" + Date.now() + "_" + Math.random().toString(36).slice(2,6), type, content: "", order: blocks.length, fontSize: type==="heading"?22:15 };
    const arr = [...blocks, b]; arr.forEach((x,i) => x.order = i);
    setBlocks(arr); flush(arr);
  };

  const removeBlock = (idx) => {
    const arr = blocks.filter((_,i) => i !== idx); arr.forEach((x,i) => x.order = i);
    setBlocks(arr); flush(arr);
  };

  const moveBlock = (idx, dir) => {
    const arr = [...blocks]; const ni = idx + dir;
    if (ni < 0 || ni >= arr.length) return;
    [arr[idx], arr[ni]] = [arr[ni], arr[idx]]; arr.forEach((x,i) => x.order = i);
    setBlocks(arr); flush(arr);
  };

  const updateContent = (idx, val) => {
    setBlocks(prev => { const arr = [...prev]; arr[idx] = { ...arr[idx], content: val }; return arr; });
  };
  const updateMeta = (idx, key, val) => {
    const arr = [...blocks]; arr[idx] = { ...arr[idx], [key]: val }; setBlocks(arr); flush(arr);
  };

  const commitToParent = () => { flush(blocks); };

  const handleFileUpload = async (idx, e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const result = await API.uploadFile(file);
      const arr = [...blocks];
      arr[idx] = { ...arr[idx], content: result.directUrl || result.thumbnailUrl, fileId: result.fileId, fileName: file.name };
      setBlocks(arr); flush(arr);
    } catch(err) { alert("업로드 실패: " + err.message); }
  };

  if (!editMode && blocks.length === 0) return null;
  const sorted = [...blocks].sort((a,b) => (a.order||0) - (b.order||0));

  return (
    <div style={{ paddingLeft: editMode ? 38 : 0, fontFamily: "'Pretendard', sans-serif" }}>
      {sorted.map((block, idx) => (
        <div key={block.id} style={{ position: "relative", marginBottom: 6 }}>
          {editMode && (
            <div style={{ position: "absolute", left: -36, top: 6, display: "flex", flexDirection: "column", gap: 2 }}>
              <button onClick={() => moveBlock(idx, -1)} disabled={idx===0} style={{ width: 22, height: 18, border: "none", background: "rgba(0,0,0,0.05)", borderRadius: 3, cursor: "pointer", fontSize: 9, color: "#888", opacity: idx===0?0.3:1 }}>▲</button>
              <button onClick={() => moveBlock(idx, 1)} disabled={idx===sorted.length-1} style={{ width: 22, height: 18, border: "none", background: "rgba(0,0,0,0.05)", borderRadius: 3, cursor: "pointer", fontSize: 9, color: "#888", opacity: idx===sorted.length-1?0.3:1 }}>▼</button>
              <button onClick={() => removeBlock(idx)} style={{ width: 22, height: 18, border: "none", background: "rgba(231,76,60,0.08)", borderRadius: 3, cursor: "pointer", fontSize: 9, color: "#e74c3c" }}>✕</button>
            </div>
          )}

          {block.type === "heading" && (
            editMode ? (
              <div>
                <input value={block.content||""} onChange={e => updateContent(idx, e.target.value)} onBlur={commitToParent} placeholder="제목을 입력하세요" style={{ width: "100%", fontSize: block.fontSize||22, fontWeight: 700, color: "#1a1a2e", border: "none", outline: "none", padding: "10px 0 4px", background: "transparent", boxSizing: "border-box", fontFamily: "'Pretendard', sans-serif", letterSpacing: "-0.5px" }} />
                <div style={{ display: "flex", gap: 4, marginBottom: 4 }}>
                  {[{s:18,l:"소"},{s:22,l:"중"},{s:28,l:"대"}].map(({s,l}) => <button key={s} onClick={() => updateMeta(idx, "fontSize", s)} style={{ padding: "2px 8px", borderRadius: 4, border: (block.fontSize||22)===s ? "1px solid " + color : "1px solid rgba(0,0,0,0.1)", background: (block.fontSize||22)===s ? color + "10" : "#fff", fontSize: 10, cursor: "pointer", color: (block.fontSize||22)===s ? color : "#888" }}>{l}</button>)}
                </div>
              </div>
            ) : block.content ? (
              <h3 style={{ fontSize: block.fontSize||22, fontWeight: 700, color: "#1a1a2e", margin: "18px 0 6px", fontFamily: "'Pretendard', sans-serif", letterSpacing: "-0.5px", lineHeight: 1.35 }}>{block.content}</h3>
            ) : null
          )}

          {block.type === "text" && (
            editMode ? (
              <div>
                <textarea value={block.content||""} onChange={e => updateContent(idx, e.target.value)} onBlur={commitToParent} placeholder="내용을 입력하세요..." rows={Math.max(3, (block.content||"").split("\n").length)} style={{ width: "100%", fontSize: block.fontSize||15, lineHeight: 1.85, color: "#333", border: "1px solid rgba(0,0,0,0.06)", borderRadius: 10, outline: "none", padding: "12px 14px", background: "#FAFAFA", resize: "vertical", boxSizing: "border-box", fontFamily: "'Pretendard', sans-serif" }} onFocus={e => e.target.style.borderColor = color} />
                <div style={{ display: "flex", gap: 4, marginTop: 4 }}>
                  {[{s:13,l:"소"},{s:15,l:"중"},{s:17,l:"대"}].map(({s,l}) => <button key={s} onClick={() => updateMeta(idx, "fontSize", s)} style={{ padding: "2px 8px", borderRadius: 4, border: (block.fontSize||15)===s ? "1px solid " + color : "1px solid rgba(0,0,0,0.1)", background: (block.fontSize||15)===s ? color + "10" : "#fff", fontSize: 10, cursor: "pointer", color: (block.fontSize||15)===s ? color : "#888" }}>{l}</button>)}
                </div>
              </div>
            ) : block.content ? (
              <div style={{ fontSize: block.fontSize||15, lineHeight: 1.85, color: "#333", whiteSpace: "pre-wrap", fontFamily: "'Pretendard', sans-serif" }}>{block.content}</div>
            ) : null
          )}

          {block.type === "image" && (
            block.content ? (
              <div style={{ borderRadius: 12, overflow: "hidden", margin: "10px 0", border: "1px solid rgba(0,0,0,0.04)" }}>

                {editMode && <div style={{ padding: "6px 10px", background: "#f9f9f9", fontSize: 11, color: "#888" }}>✓ {block.fileName || "이미지"}</div>}
              </div>
            ) : editMode ? (
              <label style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 90, borderRadius: 12, border: "2px dashed rgba(0,0,0,0.1)", background: "rgba(0,0,0,0.015)", cursor: "pointer", fontSize: 14, color: "#aaa", margin: "8px 0", gap: 8 }}>
                📷 이미지 업로드<input type="file" accept="image/*" onChange={e => handleFileUpload(idx, e)} style={{ display: "none" }} />
              </label>
            ) : null
          )}

          {block.type === "video" && (
            editMode ? (
              <div style={{ margin: "8px 0" }}>
                <input value={block.content||""} onChange={e => updateContent(idx, e.target.value)} onBlur={commitToParent} placeholder="YouTube/Vimeo URL" style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid rgba(0,0,0,0.1)", fontSize: 14, boxSizing: "border-box" }} onFocus={e => e.target.style.borderColor = color} />
                {block.content && toEmbedUrl(block.content) && <div style={{ marginTop: 8 }}><VideoEmbed url={block.content} /></div>}
              </div>
            ) : block.content && toEmbedUrl(block.content) ? <div style={{ margin: "10px 0" }}><VideoEmbed url={block.content} /></div> : null
          )}

          {block.type === "pdf" && (
            block.content ? (
              <div style={{ margin: "10px 0", borderRadius: 12, border: "1px solid rgba(0,0,0,0.06)", overflow: "hidden" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", background: "#f9f9f9" }}>
                  <span style={{ fontSize: 20 }}>📕</span>
                  <span style={{ flex: 1, fontSize: 14, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{block.fileName || "PDF 문서"}</span>
                  <a href={block.content} target="_blank" rel="noopener noreferrer" style={{ padding: "5px 14px", borderRadius: 8, background: color + "10", color, fontSize: 12, textDecoration: "none", fontWeight: 500 }}>새 탭에서 열기 ↗</a>
                </div>
                {/* PDF 미리보기 (PdfBlobView 사용) */}
                {block.fileId && <PdfBlobView file={{ id: block.fileId, name: block.fileName }} style={{ width: "100%", maxHeight: 500, background: "#fff" }} />}

            ) : editMode ? (
              <label style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 80, borderRadius: 12, border: "2px dashed rgba(0,0,0,0.1)", background: "rgba(0,0,0,0.015)", cursor: "pointer", fontSize: 14, color: "#aaa", margin: "8px 0", gap: 8 }}>

          {block.type === "divider" && <hr style={{ border: "none", borderTop: "1px solid rgba(0,0,0,0.06)", margin: "20px 0" }} />}

          {[["heading","H 제목"],["text","T 텍스트"],["image","📷 이미지"],["video","🎬 영상"],["pdf","📕 PDF"],["divider","— 구분선"]].map(([t,l]) => (

// ─── Global Search ───
function GlobalSearch({ open, onClose, pages, onNav }) {
  const [query, setQuery] = useState("");
  const inputRef = useRef(null);
  useEffect(() => { if (open) { setQuery(""); setTimeout(() => inputRef.current?.focus(), 100); } }, [open]);
  useEffect(() => { if (!open) return; const h = (e) => { if (e.key === 'Escape') onClose(); }; document.addEventListener('keydown', h); return () => document.removeEventListener('keydown', h); }, [open, onClose]);

  const results = [];
  if (query.trim().length >= 1) {
    const q = query.toLowerCase();
    (pages||[]).forEach(page => {
      // Search page names
      if (page.name.toLowerCase().includes(q)) results.push({ type: "page", page, item: null });
      // Search items
      (page.items||[]).forEach(item => {
        if ((item.title||"").toLowerCase().includes(q) || (item.desc||"").toLowerCase().includes(q) || (item.tags||[]).some(t => t.toLowerCase().includes(q))) {
          const tab = (page.tabs||[]).find(t => t.id === item.tabId);
          results.push({ type: "item", page, item, tab });
        }
      });
    });
  }

  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "flex-start", justifyContent: "center", zIndex: 9000, paddingTop: "12vh" }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: 16, width: "92%", maxWidth: 600, maxHeight: "70vh", overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.2)" }}>
        <div style={{ padding: "16px 20px", borderBottom: "1px solid rgba(0,0,0,0.06)", display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 18, color: "#aaa" }}>🔍</span>
          <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)} placeholder="페이지, 자료, 태그 검색..." style={{ flex: 1, border: "none", outline: "none", fontSize: 16, padding: "4px 0" }} />
          <button onClick={onClose} style={{ background: "rgba(0,0,0,0.06)", border: "none", padding: "4px 10px", borderRadius: 6, cursor: "pointer", fontSize: 11, color: "#888" }}>ESC</button>
        </div>
        <div style={{ maxHeight: "calc(70vh - 60px)", overflow: "auto", padding: "8px" }}>
          {query.trim().length < 1 ? (
            <div style={{ padding: "2rem", textAlign: "center", color: "#aaa", fontSize: 13 }}>검색어를 입력하세요</div>
          ) : results.length === 0 ? (
            <div style={{ padding: "2rem", textAlign: "center", color: "#aaa", fontSize: 13 }}>검색 결과가 없습니다</div>
          ) : (
            results.slice(0, 20).map((r, i) => (
              <div key={i} onClick={() => { onNav(r.page.id); onClose(); }} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 10, cursor: "pointer", marginBottom: 2 }} onMouseEnter={e => e.currentTarget.style.background = "rgba(108,92,231,0.05)"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <div style={{ width: 36, height: 36, borderRadius: 8, background: `${r.page.color}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>{r.page.icon}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  {r.type === "page" ? (
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#333" }}>{r.page.name}</div>
                  ) : (
                    <>
                      <div style={{ fontSize: 14, fontWeight: 500, color: "#333", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.item.title}</div>
                      <div style={{ fontSize: 11, color: "#aaa" }}>{r.page.icon} {r.page.name} {r.tab ? `› ${r.tab.icon} ${r.tab.name}` : ""}</div>
                    </>
                  )}
                </div>
                <span style={{ fontSize: 11, color: r.page.color, padding: "2px 8px", borderRadius: 8, background: `${r.page.color}10`, flexShrink: 0 }}>{r.type === "page" ? "페이지" : "자료"}</span>
              </div>
            ))
          )}
          {results.length > 20 && <div style={{ padding: "8px", textAlign: "center", fontSize: 12, color: "#aaa" }}>+ {results.length - 20}건 더</div>}
        </div>
      </div>
    </div>
  );
}

// ─── Page View (Landing + Tabs) ───
function PageView({ page, pages, setPages, settings, onNav, editMode, onSearch }) {
  const [activeTab, setActiveTab] = useState(null);
  const [scrolled, setScrolled] = useState(false);
  const [editorOpen, setEditorOpen] = useState(false);
  const [editItemId, setEditItemId] = useState(null);
  const [moveItemId, setMoveItemId] = useState(null);
  const [moveTabId, setMoveTabId] = useState(null);
  const [lightboxFile, setLightboxFile] = useState(null);
  const [pdfFullUrl, setPdfFullUrl] = useState(null);
  const [expandedCards, setExpandedCards] = useState({});
  const [detailItem, setDetailItem] = useState(null);
  const [search, setSearch] = useState("");
  const [fabOpen, setFabOpen] = useState(false);
  const [tabManagerOpen, setTabManagerOpen] = useState(false);
  const [pageEditorOpen, setPageEditorOpen] = useState(false);
  // New: sort, layout, bulk
  const [sortBy, setSortBy] = useState("date_desc");
  const [viewLayout, setViewLayout] = useState("grid");
  const [bulkMode, setBulkMode] = useState(false);
  const [bulkSelected, setBulkSelected] = useState(new Set());

  useEffect(() => { window.scrollTo(0,0); setBulkMode(false); setBulkSelected(new Set()); setActiveTab(null); }, [page?.id]);
  useEffect(() => { const h = () => setScrolled(window.scrollY > 40); window.addEventListener("scroll", h); return () => window.removeEventListener("scroll", h); }, []);
  useEffect(() => { setBulkSelected(new Set()); }, [activeTab]);

  if (!page) return null;
  const color = page.color || "#6C5CE7";
  const tabs = page.tabs || [];
  const children = getPageChildren(pages, page.id);
  const breadcrumb = getPagePath(pages, page.id);
  const items = activeTab ? (page.items||[]).filter(i => i.tabId === activeTab && (editMode || i.status === "published")) : [];
  const searchFiltered = items.filter(i => !search || (i.title||"").includes(search) || (i.desc||"").includes(search) || (i.tags||[]).some(t => t.includes(search)));
  // Sort
  const sorted = [...searchFiltered].sort((a,b) => {
    if (sortBy === "date_desc") return (b.date||"").localeCompare(a.date||"");
    if (sortBy === "date_asc") return (a.date||"").localeCompare(b.date||"");
    if (sortBy === "name_asc") return (a.title||"").localeCompare(b.title||"");
    if (sortBy === "name_desc") return (b.title||"").localeCompare(a.title||"");
    return 0;
  });

  const updatePage = (fn) => setPages(prev => prev.map(p => p.id === page.id ? fn({...p}) : p));

  const saveItem = (item) => {
    updatePage(p => { const idx = p.items.findIndex(i => String(i.id) === String(item.id)); if (idx >= 0) p.items[idx] = { ...p.items[idx], ...item }; else p.items.push(item); return p; });
  };
  const deleteItem = (itemId) => { if (!confirm("삭제하시겠습니까?")) return; updatePage(p => ({ ...p, items: p.items.filter(i => String(i.id) !== String(itemId)) })); };
  const moveItem = (targetPageId, targetTabId) => {
    if (!moveItemId) return;
    const item = (page.items||[]).find(i => String(i.id) === String(moveItemId));
    if (!item) return;
    const movedItem = { ...item, tabId: targetTabId };
    setPages(prev => prev.map(p => { if (p.id === page.id) return { ...p, items: p.items.filter(i => String(i.id) !== String(moveItemId)) }; if (p.id === targetPageId) return { ...p, items: [...(p.items||[]), movedItem] }; return p; }));
    setMoveItemId(null);
  };
  // Bulk actions
  const toggleBulkItem = (id) => { setBulkSelected(prev => { const s = new Set(prev); if (s.has(id)) s.delete(id); else s.add(id); return s; }); };
  const bulkSelectAll = () => { if (bulkSelected.size === sorted.length) setBulkSelected(new Set()); else setBulkSelected(new Set(sorted.map(i => i.id))); };
  const bulkDelete = () => { if (bulkSelected.size === 0) return; if (!confirm(`${bulkSelected.size}개 자료를 삭제하시겠습니까?`)) return; updatePage(p => ({ ...p, items: p.items.filter(i => !bulkSelected.has(i.id)) })); setBulkSelected(new Set()); setBulkMode(false); };
  const bulkChangeStatus = (status) => { if (bulkSelected.size === 0) return; updatePage(p => ({ ...p, items: p.items.map(i => bulkSelected.has(i.id) ? { ...i, status } : i) })); setBulkSelected(new Set()); };
  const [bulkMoveOpen, setBulkMoveOpen] = useState(false);
  const bulkMove = (targetPageId, targetTabId) => {
    if (bulkSelected.size === 0) return;
    const itemsToMove = (page.items||[]).filter(i => bulkSelected.has(i.id)).map(i => ({ ...i, tabId: targetTabId }));
    setPages(prev => prev.map(p => { if (p.id === page.id) return { ...p, items: p.items.filter(i => !bulkSelected.has(i.id)) }; if (p.id === targetPageId) return { ...p, items: [...(p.items||[]), ...itemsToMove] }; return p; }));
    setBulkSelected(new Set()); setBulkMode(false); setBulkMoveOpen(false);
  };

  const saveContentBlocks = (blocks) => {
    updatePage(p => ({ ...p, contentBlocks: blocks }));
  };

  const savePageTabs = (updatedPage) => { setPages(prev => prev.map(p => p.id === updatedPage.id ? updatedPage : p)); };
  const activeTabObj = tabs.find(t => t.id === activeTab);
  const coverSrc = page.coverImage?.directUrl || page.coverImage?.thumbnailUrl;

  // Card renderer
  const duplicateItem = (item) => {

    dup.title = (item.title || "") + " (복사)";

          {bulkMode && <input type="checkbox" checked={isBulkSel} onChange={() => toggleBulkItem(item.id)} onClick={e => e.stopPropagation()} style={{ width: 18, height: 18, accentColor: color }} />}
          {thumb && <img src={thumb} style={{ width: 48, height: 48, borderRadius: 8, objectFit: "cover", flexShrink: 0 }} />}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontWeight: 600, fontSize: 14, color: "#1a1a2e", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.title}</div>
            <div style={{ fontSize: 12, color: "#aaa" }}>{timeAgo(item.date) || item.date} {item.files?.length > 0 && `· 📎${item.files.length}`} {item.status === "draft" && "· 비공개"}</div>
          </div>
          {editMode && !bulkMode && (
            <div style={{ display: "flex", gap: 4 }}>
              <button onClick={e => { e.stopPropagation(); setEditItemId(item.id); setEditorOpen(true); }} style={{ width: 28, height: 28, borderRadius: "50%", border: "none", background: "rgba(0,0,0,0.04)", fontSize: 12, cursor: "pointer" }}>✏️</button>
              <button onClick={e => { e.stopPropagation(); duplicateItem(item); }} title="복제" style={{ width: 28, height: 28, borderRadius: "50%", border: "none", background: "rgba(0,0,0,0.04)", fontSize: 12, cursor: "pointer" }}>📋</button>
              <button onClick={e => { e.stopPropagation(); setMoveItemId(item.id); setMoveTabId(activeTab); }} style={{ width: 28, height: 28, borderRadius: "50%", border: "none", background: "rgba(0,0,0,0.04)", fontSize: 12, cursor: "pointer" }}>↗️</button>
              <button onClick={e => { e.stopPropagation(); deleteItem(item.id); }} style={{ width: 28, height: 28, borderRadius: "50%", border: "none", background: "rgba(0,0,0,0.04)", color: "#e74c3c", fontSize: 12, cursor: "pointer" }}>🗑️</button>
            </div>
          )}
        </div>
      );
    }

    // Gallery mode (image focused)
    if (viewLayout === "gallery") {
      return (
        <div key={item.id} style={{ position: "relative", borderRadius: 14, overflow: "hidden", border: isBulkSel ? `2px solid ${color}` : "1px solid rgba(0,0,0,0.05)", cursor: "pointer", background: "#fff" }} onClick={() => bulkMode ? toggleBulkItem(item.id) : setDetailItem(item)}>
          {bulkMode && <div style={{ position: "absolute", top: 8, left: 8, zIndex: 3 }}><input type="checkbox" checked={isBulkSel} onChange={() => toggleBulkItem(item.id)} onClick={e => e.stopPropagation()} style={{ width: 18, height: 18, accentColor: color }} /></div>}
          <div style={{ aspectRatio: "4/3", overflow: "hidden", background: "#f5f5f5" }}>
            {thumb ? <img src={thumb} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32, color: "#ddd", background: `linear-gradient(135deg, ${color}15, ${color}05)` }}>{hasVideo ? "🎬" : "📄"}</div>}
          </div>
          <div style={{ padding: "10px 12px" }}>
            <div style={{ fontWeight: 600, fontSize: 13, color: "#1a1a2e", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.title}</div>
          </div>
          {editMode && !bulkMode && (
            <div style={{ position: "absolute", top: 6, right: 6, display: "flex", gap: 3 }}>
              <button onClick={e => { e.stopPropagation(); setEditItemId(item.id); setEditorOpen(true); }} style={{ width: 26, height: 26, borderRadius: "50%", border: "none", background: "rgba(255,255,255,0.9)", fontSize: 11, cursor: "pointer", boxShadow: "0 1px 4px rgba(0,0,0,0.15)" }}>✏️</button>
              <button onClick={e => { e.stopPropagation(); duplicateItem(item); }} title="복제" style={{ width: 26, height: 26, borderRadius: "50%", border: "none", background: "rgba(255,255,255,0.9)", fontSize: 11, cursor: "pointer", boxShadow: "0 1px 4px rgba(0,0,0,0.15)" }}>📋</button>
              <button onClick={e => { e.stopPropagation(); deleteItem(item.id); }} style={{ width: 26, height: 26, borderRadius: "50%", border: "none", background: "rgba(255,255,255,0.9)", color: "#e74c3c", fontSize: 11, cursor: "pointer", boxShadow: "0 1px 4px rgba(0,0,0,0.15)" }}>🗑️</button>
            </div>
          )}
        </div>
      );
    }

    // Grid mode (default)
    return (
      <div key={item.id} style={{ position: "relative", background: "#fff", borderRadius: 16, border: isBulkSel ? `2px solid ${color}` : editMode && item.status === "draft" ? "2px dashed #e67e22" : "1px solid rgba(0,0,0,0.05)", overflow: "hidden", transition: "all 0.2s" }}
        onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-3px)"; e.currentTarget.style.boxShadow = "0 8px 20px rgba(0,0,0,0.06)"; }}
        onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}>
        {bulkMode && <div style={{ position: "absolute", top: 8, left: 8, zIndex: 3 }}><input type="checkbox" checked={isBulkSel} onChange={() => toggleBulkItem(item.id)} style={{ width: 18, height: 18, accentColor: color }} /></div>}
        {editMode && !bulkMode && (
          <div style={{ position: "absolute", top: 8, right: 8, zIndex: 5, display: "flex", gap: 3 }}>
            {item.status === "draft" && <div style={{ padding: "3px 8px", borderRadius: 12, background: "#e67e22", color: "#fff", fontSize: 10, fontWeight: 600 }}>비공개</div>}
            <button onClick={() => { setEditItemId(item.id); setEditorOpen(true); }} style={{ width: 28, height: 28, borderRadius: "50%", border: "none", background: "rgba(255,255,255,0.95)", fontSize: 12, cursor: "pointer", boxShadow: "0 2px 6px rgba(0,0,0,0.15)" }}>✏️</button>
            <button onClick={() => duplicateItem(item)} title="복제" style={{ width: 28, height: 28, borderRadius: "50%", border: "none", background: "rgba(255,255,255,0.95)", fontSize: 12, cursor: "pointer", boxShadow: "0 2px 6px rgba(0,0,0,0.15)" }}>📋</button>
            <button onClick={() => { setMoveItemId(item.id); setMoveTabId(activeTab); }} style={{ width: 28, height: 28, borderRadius: "50%", border: "none", background: "rgba(255,255,255,0.95)", fontSize: 12, cursor: "pointer", boxShadow: "0 2px 6px rgba(0,0,0,0.15)" }} title="이동">↗️</button>
            <button onClick={() => deleteItem(item.id)} style={{ width: 28, height: 28, borderRadius: "50%", border: "none", background: "rgba(255,255,255,0.95)", color: "#e74c3c", fontSize: 12, cursor: "pointer", boxShadow: "0 2px 6px rgba(0,0,0,0.15)" }}>🗑️</button>
          </div>
        )}
        {isExpanded && hasVideoFile && firstVidFile ? ( <div style={{ position: "relative" }}><VideoFileCard fileId={firstVidFile.id} /><button onClick={() => setExpandedCards(p => ({...p, [item.id]: false}))} style={{ position: "absolute", top: 8, right: 8, background: "rgba(0,0,0,0.6)", border: "none", color: "#fff", width: 28, height: 28, borderRadius: "50%", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button></div>
        ) : isExpanded && hasVideo ? ( <div style={{ position: "relative" }}><VideoEmbed url={vidUrl} /><button onClick={() => setExpandedCards(p => ({...p, [item.id]: false}))} style={{ position: "absolute", top: 8, right: 8, background: "rgba(0,0,0,0.6)", border: "none", color: "#fff", width: 28, height: 28, borderRadius: "50%", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button></div>
        ) : thumb ? (
          <div style={{ position: "relative", cursor: (hasVideo || hasVideoFile) ? "pointer" : "zoom-in" }} onClick={() => { if (hasVideo || hasVideoFile) setExpandedCards(p => ({...p, [item.id]: true})); else { const img = item.files?.find(f => isImg(f)); if (img) setLightboxFile(img); } }}>
            <img src={thumb} style={{ width: "100%", maxHeight: 300, objectFit: "contain", background: "#f5f5f5" }} />
            {(hasVideo || hasVideoFile) && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.3)" }}><div style={{ width: 48, height: 48, borderRadius: "50%", background: "rgba(255,255,255,0.9)", display: "flex", alignItems: "center", justifyContent: "center" }}>▶️</div></div>}
          </div>
        ) : (hasVideo || hasVideoFile) ? (
          <div onClick={() => setExpandedCards(p => ({...p, [item.id]: true}))} style={{ height: 160, background: `linear-gradient(135deg, ${color}25, ${color}08)`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
            <div style={{ width: 48, height: 48, borderRadius: "50%", background: "rgba(255,255,255,0.8)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 6 }}>▶️</div>
          </div>
        ) : null}
        <div style={{ padding: "14px 18px 18px" }} onClick={() => bulkMode ? toggleBulkItem(item.id) : null}>
          <div style={{ display: "flex", gap: 4, marginBottom: 6, flexWrap: "wrap" }}>
            {(item.tags || []).slice(0,2).map((t,i) => <Badge key={i} bg="rgba(0,0,0,0.04)" color="#888">#{t}</Badge>)}
            {item.files?.length > 0 && <Badge bg="rgba(0,0,0,0.04)" color="#888">📎 {item.files.length}</Badge>}
          </div>
          <div style={{ fontWeight: 600, fontSize: 15, color: "#1a1a2e", marginBottom: 4, lineHeight: 1.35, cursor: "pointer" }} onClick={() => !bulkMode && setDetailItem(item)} onMouseEnter={e => e.currentTarget.style.color = color} onMouseLeave={e => e.currentTarget.style.color = "#1a1a2e"}>{item.title}</div>
          {item.desc && <div style={{ fontSize: 13, color: "#888", lineHeight: 1.5, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{item.desc}</div>}
          <div style={{ fontSize: 11, color: "#bbb", marginTop: 8, display: "flex", justifyContent: "space-between" }}>
            <span>{timeAgo(item.date) || item.date}</span>
            {!bulkMode && <button onClick={() => setDetailItem(item)} style={{ fontSize: 12, color, fontWeight: 500, background: "none", border: "none", cursor: "pointer" }}>상세보기 →</button>}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{ minHeight: "100vh", background: "#FAFAFA" }}>
      <PageNav pages={pages} activePage={page.id} onNav={onNav} scrolled={scrolled} settings={settings} onSearch={onSearch} />

      {/* Header with cover image */}
      {coverSrc ? (
        <div style={{ position: "relative", height: 240, overflow: "hidden" }}>
          <img src={coverSrc} style={{ width: "100%", height: "100%", objectFit: "cover", filter: "brightness(0.65)" }} />
          <div style={{ position: "absolute", inset: 0, background: `linear-gradient(transparent 40%, ${color}cc)` }} />
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "0 2rem 1.5rem" }}>
            <div style={{ maxWidth: 1040, margin: "0 auto" }}>
              <div style={{ display: "flex", gap: 6, alignItems: "center", fontSize: 12, color: "rgba(255,255,255,0.75)", marginBottom: 10 }}>
                <span onClick={() => onNav("home")} style={{ cursor: "pointer" }}>홈</span>
                {breadcrumb.map((bp, i) => (<React.Fragment key={bp.id}><span>/</span><span onClick={() => onNav(bp.id)} style={{ cursor: "pointer", color: i === breadcrumb.length-1 ? "#fff" : "rgba(255,255,255,0.75)", fontWeight: i === breadcrumb.length-1 ? 600 : 400 }}>{bp.icon} {bp.name}</span></React.Fragment>))}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <div style={{ width: 52, height: 52, borderRadius: 14, background: "rgba(255,255,255,0.2)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>{page.icon}</div>
                <h1 style={{ margin: 0, fontSize: 28, fontWeight: 700, color: "#fff", flex: 1 }}>{page.name}</h1>
                {editMode && (
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => setPageEditorOpen(true)} style={{ padding: "7px 14px", borderRadius: 20, background: "rgba(255,255,255,0.2)", color: "#fff", border: "1px solid rgba(255,255,255,0.3)", cursor: "pointer", fontSize: 12, backdropFilter: "blur(4px)" }}>✏️ 수정</button>
                    <button onClick={() => setTabManagerOpen(true)} style={{ padding: "7px 14px", borderRadius: 20, background: "rgba(255,255,255,0.2)", color: "#fff", border: "1px solid rgba(255,255,255,0.3)", cursor: "pointer", fontSize: 12, backdropFilter: "blur(4px)" }}>⚙️ 탭</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ background: `linear-gradient(145deg, ${color}dd, ${color}88)`, padding: "2.5rem 2rem 2rem" }}>
          <div style={{ maxWidth: 1040, margin: "0 auto" }}>
            <div style={{ display: "flex", gap: 6, alignItems: "center", fontSize: 12, color: "rgba(255,255,255,0.7)", marginBottom: 16 }}>
              <span onClick={() => onNav("home")} style={{ cursor: "pointer" }}>홈</span>
              {breadcrumb.map((bp, i) => (<React.Fragment key={bp.id}><span>/</span><span onClick={() => onNav(bp.id)} style={{ cursor: "pointer", color: i === breadcrumb.length-1 ? "#fff" : "rgba(255,255,255,0.7)", fontWeight: i === breadcrumb.length-1 ? 600 : 400 }}>{bp.icon} {bp.name}</span></React.Fragment>))}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <div style={{ width: 56, height: 56, borderRadius: 16, background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28 }}>{page.icon}</div>
              <div style={{ flex: 1 }}><h1 style={{ margin: 0, fontSize: 28, fontWeight: 700, color: "#fff" }}>{page.name}</h1></div>
              {editMode && (
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setPageEditorOpen(true)} style={{ padding: "8px 14px", borderRadius: 20, background: "rgba(255,255,255,0.2)", color: "#fff", border: "1px solid rgba(255,255,255,0.3)", cursor: "pointer", fontSize: 12 }}>✏️ 수정</button>
                  <button onClick={() => setTabManagerOpen(true)} style={{ padding: "8px 14px", borderRadius: 20, background: "rgba(255,255,255,0.2)", color: "#fff", border: "1px solid rgba(255,255,255,0.3)", cursor: "pointer", fontSize: 12 }}>⚙️ 탭</button>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      <div style={{ maxWidth: 1040, margin: "0 auto", padding: "0 2rem 4rem" }}>
        {/* Landing content */}
        {(!activeTab || activeTab === "__landing") && (
          <div style={{ background: "#fff", borderRadius: 18, padding: "32px 36px", margin: "24px 0", border: "1px solid rgba(0,0,0,0.05)" }}>
            {/* Description */}
            {page.desc && <div style={{ fontSize: 15, lineHeight: 1.9, color: "#444", whiteSpace: "pre-wrap", marginBottom: (page.contentBlocks||[]).length > 0 ? 20 : 0 }}>{page.desc}</div>}

            {/* Block editor content */}
            <BlockEditor blocks={page.contentBlocks || []} onChange={saveContentBlocks} editMode={editMode} color={color} />

            {editMode && (page.contentBlocks||[]).length === 0 && !page.desc && (
              <div style={{ textAlign: "center", padding: "2rem", color: "#bbb", fontSize: 14 }}>
                아래 버튼으로 콘텐츠 블록을 추가하세요
              </div>
            )}

            {/* Children pages */}
            {children.length > 0 && (
              <div style={{ marginTop: 24 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#333", marginBottom: 12 }}>하위 페이지</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 12 }}>
                  {children.map(child => (
                    <div key={child.id} onClick={() => onNav(child.id)} style={{ padding: "16px 14px", borderRadius: 14, background: `${child.color}08`, border: `1px solid ${child.color}20`, cursor: "pointer", textAlign: "center", transition: "all 0.2s" }}
                      onMouseEnter={e => e.currentTarget.style.transform = "translateY(-2px)"}
                      onMouseLeave={e => e.currentTarget.style.transform = ""}>
                      <div style={{ fontSize: 22, marginBottom: 6 }}>{child.icon}</div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#333" }}>{child.name}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* Tab navigation */}
        {tabs.length > 0 && (
          <div style={{ display: "flex", gap: 6, margin: "20px 0 16px", flexWrap: "wrap", alignItems: "center" }}>
            <button onClick={() => setActiveTab(null)} style={{ padding: "8px 18px", borderRadius: 24, fontSize: 13, fontWeight: !activeTab ? 600 : 400, background: !activeTab ? color : "#fff", color: !activeTab ? "#fff" : "#666", border: !activeTab ? `1px solid ${color}` : "1px solid rgba(0,0,0,0.08)", cursor: "pointer" }}>📋 소개</button>
            {tabs.sort((a,b)=>(a.order||0)-(b.order||0)).map(t => {
              const count = (page.items||[]).filter(i => i.tabId === t.id && (editMode || i.status === "published")).length;
              return (
                <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ padding: "8px 18px", borderRadius: 24, fontSize: 13, fontWeight: activeTab === t.id ? 600 : 400, background: activeTab === t.id ? color : "#fff", color: activeTab === t.id ? "#fff" : "#666", border: activeTab === t.id ? `1px solid ${color}` : "1px solid rgba(0,0,0,0.08)", cursor: "pointer" }}>
                  {t.icon} {t.name} {count > 0 && <span style={{ marginLeft: 4, fontSize: 11, opacity: 0.8 }}>{count}</span>}
                </button>
              );
            })}
          </div>
        )}

        {/* Tab content - item grid */}
        {activeTab && activeTabObj && (
          <div>
            {/* Toolbar: search + sort + layout + bulk */}
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="검색..." style={{ flex: 1, minWidth: 180, borderRadius: 12, border: "1px solid rgba(0,0,0,0.06)", padding: "10px 14px", fontSize: 14 }} />
              <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{ padding: "10px 12px", borderRadius: 12, border: "1px solid rgba(0,0,0,0.06)", fontSize: 13, color: "#666", background: "#fff" }}>
                <option value="date_desc">최신순</option>
                <option value="date_asc">오래된순</option>
                <option value="name_asc">이름순 ↑</option>
                <option value="name_desc">이름순 ↓</option>
              </select>
              <div style={{ display: "flex", border: "1px solid rgba(0,0,0,0.06)", borderRadius: 10, overflow: "hidden" }}>
                {[["grid","▦"],["list","☰"],["gallery","▣"]].map(([m,ic]) => (
                  <button key={m} onClick={() => setViewLayout(m)} style={{ padding: "8px 12px", border: "none", background: viewLayout === m ? `${color}15` : "#fff", color: viewLayout === m ? color : "#888", cursor: "pointer", fontSize: 14 }} title={m}>{ic}</button>
                ))}
              </div>
              {editMode && (
                <>
                  <button onClick={() => { setBulkMode(b => !b); setBulkSelected(new Set()); }} style={{ padding: "8px 14px", borderRadius: 12, border: bulkMode ? `1px solid ${color}` : "1px solid rgba(0,0,0,0.06)", background: bulkMode ? `${color}10` : "#fff", color: bulkMode ? color : "#666", cursor: "pointer", fontSize: 13, fontWeight: bulkMode ? 600 : 400 }}>{bulkMode ? "✕ 선택 해제" : "☑ 선택"}</button>
                  <button onClick={() => { setEditItemId(null); setEditorOpen(true); }} style={{ padding: "8px 18px", borderRadius: 12, background: color, color: "#fff", border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap" }}>＋ 추가</button>
                </>
              )}
            </div>

            {/* Bulk action bar */}
            {bulkMode && bulkSelected.size > 0 && (
              <div style={{ display: "flex", gap: 8, alignItems: "center", padding: "10px 16px", marginBottom: 12, borderRadius: 12, background: `${color}08`, border: `1px solid ${color}20` }}>
                <button onClick={bulkSelectAll} style={{ padding: "5px 12px", borderRadius: 8, border: "1px solid rgba(0,0,0,0.1)", background: "#fff", fontSize: 12, cursor: "pointer" }}>{bulkSelected.size === sorted.length ? "전체 해제" : "전체 선택"}</button>
                <span style={{ fontSize: 13, color, fontWeight: 600 }}>{bulkSelected.size}개 선택됨</span>
                <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
                  <button onClick={() => setBulkMoveOpen(true)} style={{ padding: "5px 14px", borderRadius: 8, background: "#fff", border: "1px solid rgba(0,0,0,0.1)", fontSize: 12, cursor: "pointer" }}>↗️ 이동</button>
                  <button onClick={() => bulkChangeStatus("published")} style={{ padding: "5px 14px", borderRadius: 8, background: "#fff", border: "1px solid rgba(0,0,0,0.1)", fontSize: 12, cursor: "pointer" }}>👁️ 공개</button>
                  <button onClick={() => bulkChangeStatus("draft")} style={{ padding: "5px 14px", borderRadius: 8, background: "#fff", border: "1px solid rgba(0,0,0,0.1)", fontSize: 12, cursor: "pointer" }}>🔒 비공개</button>
                  <button onClick={bulkDelete} style={{ padding: "5px 14px", borderRadius: 8, background: "#fff", border: "1px solid #e74c3c", color: "#e74c3c", fontSize: 12, cursor: "pointer" }}>🗑️ 삭제</button>
                </div>
              </div>
            )}

            {sorted.length > 0 ? (
              <div style={viewLayout === "list" ? {} : { display: "grid", gridTemplateColumns: viewLayout === "gallery" ? "repeat(auto-fill, minmax(200px, 1fr))" : "repeat(auto-fill, minmax(280px, 1fr))", gap: viewLayout === "gallery" ? 12 : 16 }}>
                {sorted.map(item => renderCard(item))}
              </div>
            ) : (
              <div style={{ textAlign: "center", padding: "3rem", color: "#aaa" }}>
                <div style={{ fontSize: 36, marginBottom: 8, opacity: 0.3 }}>{activeTabObj.icon}</div>
                <div>등록된 자료가 없습니다</div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Detail Modal */}
      <Modal open={!!detailItem} onClose={() => setDetailItem(null)} title={detailItem?.title || ""} width={760}>
        {detailItem && (
          <div>
            {detailItem.videoUrl && toEmbedUrl(detailItem.videoUrl) && <div style={{ marginBottom: 16 }}><VideoEmbed url={detailItem.videoUrl} /></div>}
            {detailItem.files?.filter(f => isImg(f)).length > 0 && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 12, color: "#999", marginBottom: 8 }}>이미지</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 8 }}>
                  {detailItem.files.filter(f => isImg(f)).map(f => {
                    const src = getDisplaySrc(f);
                    return <div key={f.id} onClick={() => setLightboxFile(f)} style={{ cursor: "zoom-in" }}>{src ? <img src={src} style={{ width: "100%", height: 120, objectFit: "cover", borderRadius: 10 }} /> : <div style={{ width: "100%", height: 120, borderRadius: 10, background: "rgba(0,0,0,0.04)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>🖼️</div>}</div>;
                  })}
                </div>
              </div>
            )}
            {detailItem.files?.filter(f => isPdf(f)).map(f => (
              <div key={f.id} style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>

// ─── 유틸: 상대 시간 ───
function timeAgo(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return "방금 전";
  if (diff < 3600) return Math.floor(diff / 60) + "분 전";
  if (diff < 86400) return Math.floor(diff / 3600) + "시간 전";
  if (diff < 604800) return Math.floor(diff / 86400) + "일 전";
  return dateStr;
}

// ─── 유틸: YouTube 썸네일 URL ───
function getYouTubeThumbnail(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
  return m ? `https://img.youtube.com/vi/${m[1]}/mqdefault.jpg` : null;
}

// ─── Page Tree Manager (Admin) ───
function PageTreeManager({ pages, setPages, persistPages }) {
  const [editorOpen, setEditorOpen] = useState(false);
  const [editPage, setEditPage] = useState(null);

  const addPage = () => { setEditPage(null); setEditorOpen(true); };
  const editP = (p) => { setEditPage(p); setEditorOpen(true); };
  const savePage = (p) => {
    setPages(prev => {
      const idx = prev.findIndex(x => x.id === p.id);
      if (idx >= 0) { const arr = [...prev]; arr[idx] = p; return arr; }
      return [...prev, p];
    });
  };
  const deletePage = (pageId) => {
    const children = getPageChildren(pages, pageId);
    if (children.length > 0) { alert("하위 페이지가 있습니다. 먼저 하위 페이지를 삭제하세요."); return; }
    if (!confirm("이 페이지와 포함된 모든 자료를 삭제하시겠습니까?")) return;
    setPages(prev => prev.filter(p => p.id !== pageId));
  };
  const duplicatePage = (page) => {
    const newId = "pg_" + Date.now() + "_" + Math.floor(Math.random()*10000);
    const dup = JSON.parse(JSON.stringify(page));
    dup.id = newId;
    dup.name = page.name + " (복사)";
    dup.order = pages.length;
    // 아이템 ID도 모두 새로 생성
    dup.items = (dup.items||[]).map(item => ({ ...item, id: genId() }));
    // 탭 ID도 새로 생성하고 아이템의 tabId도 매핑
    const tabIdMap = {};
    dup.tabs = (dup.tabs||[]).map(tab => { const newTabId = "tab_" + Date.now() + "_" + Math.random().toString(36).slice(2,6); tabIdMap[tab.id] = newTabId; return { ...tab, id: newTabId }; });
    dup.items = dup.items.map(item => ({ ...item, tabId: tabIdMap[item.tabId] || item.tabId }));
    setPages(prev => [...prev, dup]);
  };
  const movePage = (pageId, dir) => {
    setPages(prev => {
      const arr = [...prev];
      const p = arr.find(x => x.id === pageId);
      if (!p) return arr;
      const siblings = arr.filter(x => x.parentId === p.parentId).sort((a,b) => (a.order||0)-(b.order||0));
      const idx = siblings.findIndex(x => x.id === pageId);
      const ni = idx + dir;
      if (ni < 0 || ni >= siblings.length) return arr;
      const temp = siblings[idx].order; siblings[idx].order = siblings[ni].order; siblings[ni].order = temp;
      return arr;
    });
  };

  const renderTree = (parentId, depth) => {
    const children = getPageChildren(pages, parentId);
    return children.map((p, i) => (
      <div key={p.id}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 14px", paddingLeft: `${14 + depth * 24}px`, borderRadius: 10, marginBottom: 4, background: "#fff", border: "1px solid rgba(0,0,0,0.04)" }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: `${p.color}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>{p.icon}</div>
          <span style={{ flex: 1, fontSize: 14, fontWeight: 500, color: "#333" }}>{p.name}</span>
          <span style={{ fontSize: 11, color: "#aaa" }}>{(p.items||[]).length}건</span>
          <button onClick={() => movePage(p.id, -1)} disabled={i===0} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, opacity: i===0?0.3:1 }}>↑</button>
          <button onClick={() => movePage(p.id, 1)} disabled={i===children.length-1} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, opacity: i===children.length-1?0.3:1 }}>↓</button>
          <button onClick={() => editP(p)} style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid rgba(0,0,0,0.1)", background: "#fff", fontSize: 12, cursor: "pointer" }}>편집</button>
          <button onClick={() => duplicatePage(p)} title="복제" style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid rgba(0,0,0,0.1)", background: "#fff", fontSize: 12, cursor: "pointer" }}>📋</button>
          <button onClick={() => deletePage(p.id)} style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #e74c3c", background: "#fff", color: "#e74c3c", fontSize: 12, cursor: "pointer" }}>삭제</button>
        </div>
        {renderTree(p.id, depth + 1)}
      </div>
    ));
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 600 }}>페이지 관리</h2>
          <p style={{ margin: "4px 0 0", fontSize: 13, color: "#888" }}>페이지를 추가, 수정, 정렬할 수 있습니다.</p>
        </div>
        <button onClick={addPage} style={{ padding: "10px 20px", borderRadius: 24, background: "#6C5CE7", color: "#fff", border: "none", cursor: "pointer", fontSize: 14, fontWeight: 500 }}>＋ 새 페이지</button>
      </div>
      {pages.length === 0 ? (
        <div style={{ textAlign: "center", padding: "4rem", color: "#aaa", background: "#fff", borderRadius: 14 }}>
          <div style={{ fontSize: 48, marginBottom: 12, opacity: 0.3 }}>📂</div>
          <div style={{ fontSize: 15, marginBottom: 8 }}>아직 페이지가 없습니다</div>
          <div style={{ fontSize: 13, marginBottom: 20 }}>"새 페이지" 버튼을 눌러 첫 페이지를 만드세요</div>
        </div>
      ) : renderTree(null, 0)}
      <PageEditorModal open={editorOpen} onClose={() => setEditorOpen(false)} page={editPage} pages={pages} onSave={savePage} />
    </div>
  );
}

// ─── Legacy Data Migration ───
function LegacyMigration({ pages, setPages, sectionData }) {
  const [migrating, setMigrating] = useState(false);
  const [result, setResult] = useState(null);

  const hasLegacy = Object.keys(sectionData || {}).some(k => (sectionData[k]?.items||[]).length > 0 || (sectionData[k]?.subCategories||[]).length > 0);

  const doMigrate = () => {
    if (!confirm("기존 자료를 새 페이지 시스템으로 가져옵니다. 계속하시겠습니까?")) return;
    setMigrating(true);
    const newPages = [...pages];
    let count = 0;

    Object.entries(SECTION_DEFS).forEach(([sectionKey, def]) => {
      const sec = sectionData[sectionKey];
      if (!sec || ((sec.items||[]).length === 0 && (sec.subCategories||[]).length === 0)) return;

      // Create or find matching page
      let page = newPages.find(p => p.name === def.name);
      if (!page) {
        const grads = { curriculum: "#6C5CE7", portfolio: "#E8A0BF", links: "#3498db", seminar: "#e67e22", trend: "#27ae60", promo: "#f39c12", mentor: "#8EA7E9" };
        page = {
          id: "pg_mig_" + sectionKey, name: def.name, icon: def.icon, color: grads[sectionKey] || "#6C5CE7",
          parentId: null, order: newPages.length, desc: "",
          tabs: [{ id: "tab_mig_" + sectionKey, name: def.name, icon: def.icon, order: 0 }],
          items: [], tabFields: {}, contentBlocks: []
        };
        newPages.push(page);
      }

      const tabId = page.tabs[0]?.id;
      (sec.items || []).forEach(item => {
        if (page.items.some(i => String(i.id) === String(item.id))) return;
        page.items.push({ ...item, tabId });
        count++;
      });
    });

    setPages(newPages);
    // Force immediate save for migration
    API._ensure().then(d => { d.pages = newPages; return API._persist(); }).then(() => {
      setResult(`✅ ${count}개 자료를 가져왔습니다.`);
    }).catch(e => { setResult("❌ 오류: " + e.message); });
    setMigrating(false);
  };

  return (
    <div>
      <h2 style={{ margin: "0 0 4px", fontSize: 22, fontWeight: 600 }}>기존 자료 가져오기</h2>
      <p style={{ margin: "0 0 20px", fontSize: 13, color: "#888" }}>이전 버전(섹션 기반)의 자료를 새 페이지 시스템으로 가져옵니다.</p>
      {hasLegacy ? (
        <div style={{ background: "#fff", border: "1px solid rgba(0,0,0,0.06)", borderRadius: 14, padding: 24 }}>
          <div style={{ fontWeight: 600, marginBottom: 8 }}>📦 기존 자료 발견</div>
          <div style={{ fontSize: 13, color: "#666", lineHeight: 1.6, marginBottom: 16 }}>
            {Object.entries(SECTION_DEFS).map(([k, d]) => {
              const cnt = (sectionData[k]?.items||[]).length;
              return cnt > 0 ? <div key={k}>{d.icon} {d.name}: {cnt}건</div> : null;
            })}
          </div>
          <button onClick={doMigrate} disabled={migrating} style={{ padding: "12px 24px", borderRadius: 10, background: "#6C5CE7", color: "#fff", border: "none", cursor: "pointer", fontSize: 14, fontWeight: 500 }}>새 페이지로 가져오기</button>
        </div>
      ) : (
        <div style={{ background: "#fff", border: "1px solid rgba(0,0,0,0.06)", borderRadius: 14, padding: 24, textAlign: "center", color: "#aaa" }}>기존 자료가 없습니다.</div>
      )}
      {result && <div style={{ marginTop: 16, padding: 12, borderRadius: 8, background: "#F0F7FF", fontSize: 13 }}>{result}</div>}
    </div>
  );
}
